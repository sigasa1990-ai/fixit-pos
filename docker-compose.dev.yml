version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fixit-postgres-dev
    environment:
      POSTGRES_DB: fixit_pos
      POSTGRES_USER: fixit
      POSTGRES_PASSWORD: fixit_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fixit"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fixit-backend-dev
    environment:
      APP_NAME: "FIXIT POS API"
      APP_VERSION: "1.0.0"
      DEBUG: "true"
      DATABASE_URL: "postgresql+asyncpg://fixit:fixit_dev_password@postgres:5432/fixit_pos"
      DATABASE_ECHO: "true"
      JWT_SECRET_KEY: "dev-secret-key-not-for-production"
      JWT_EXPIRATION_HOURS: "24"
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-config app/logging.conf"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: fixit-frontend-dev
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend

volumes:
  postgres_dev_data:
