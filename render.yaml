services:
  - type: web
    name: fixit-pos-api
    env: python
    region: ohio
    plan: starter
    domain: api-pos.fixitsoluciones.com
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --log-config app/logging.conf
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: FIXIT POS API
      - key: APP_VERSION
        value: "1.0.0"
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: fixit-pos-db
          property: connectionString
      - key: DATABASE_ECHO
        value: "false"
      - key: DATABASE_POOL_SIZE
        value: "20"
      - key: DATABASE_MAX_OVERFLOW
        value: "10"
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_HOURS
        value: "8"
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: MAX_LOGIN_ATTEMPTS
        value: "5"
      - key: LOGIN_LOCKOUT_MINUTES
        value: "15"
      - key: CORS_ORIGINS
        value: '["https://pos.fixitsoluciones.com","https://staging-pos.fixitsoluciones.com","http://localhost:3000"]'
      - key: LOG_LEVEL
        value: INFO
    disk:
      name: logs
      mountPath: /app/logs
      sizeGB: 1

databases:
  - name: fixit-pos-db
    plan: starter
    region: ohio
    databaseName: fixit_pos
    user: fixit
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
