version: "3.8"

networks:
  fixit-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_prod_data:
  backend_logs:
  backup_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: fixit-postgres
    environment:
      POSTGRES_DB: fixit_pos
      POSTGRES_USER: fixit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - fixit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fixit"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=production
    container_name: fixit-backend
    environment:
      APP_NAME: "FIXIT POS API"
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: "false"
      DATABASE_URL: "postgresql+asyncpg://fixit:${POSTGRES_PASSWORD}@postgres:5432/fixit_pos"
      DATABASE_ECHO: "false"
      DATABASE_POOL_SIZE: "20"
      DATABASE_MAX_OVERFLOW: "10"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?error}
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRATION_HOURS: "8"
      BCRYPT_ROUNDS: "12"
      MAX_LOGIN_ATTEMPTS: "5"
      LOGIN_LOCKOUT_MINUTES: "15"
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost:3000"]'}
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: "INFO"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - backend_logs:/app/logs
    networks:
      - fixit-network
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --log-config app/logging.conf"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.fixitpos.com}
    container_name: fixit-frontend
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - fixit-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  backup:
    image: postgres:16-alpine
    container_name: fixit-backup
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - backup_data:/backup
      - ./scripts/backup.sh:/backup.sh:ro
    networks:
      - fixit-network
    depends_on:
      - postgres
    command: >
      sh -c "apk add --no-cache aws-cli && while true; do
        sleep 3600 && /backup.sh;
      done"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
